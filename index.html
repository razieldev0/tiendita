<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deudores Pro · Tienda de Abarrotes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f7 100%);
            color: #1e293b;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            padding: 24px 20px 30px;
            border: 1px solid rgba(255,255,255,0.8);
        }
        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 28px;
            color: #0f172a;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitulo {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
            font-weight: 500;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            background: #f1f5f9;
            padding: 6px;
            border-radius: 16px;
            flex-wrap: wrap;
        }
        .tab {
            flex: 1;
            min-width: 130px;
            padding: 12px 16px;
            background: transparent;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            color: #475569;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
            transform: translateY(-1px);
        }
        .tab:hover:not(.active) { background: #e2e8f0; color: #1e293b; }
        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card {
            background: white;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 18px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.03);
            border: 1px solid #e9eef3;
        }
        .clientes-lista { display: flex; flex-direction: column; gap: 12px; }
        .cliente-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
            transition: all 0.2s;
        }
        .cliente-item:hover { border-color: #cbd5e1; box-shadow: 0 6px 18px rgba(0,0,0,0.04); }
        .cliente-info { display: flex; flex-direction: column; gap: 6px; }
        .cliente-nombre {
            font-weight: 700;
            font-size: 18px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .saldo-badge {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            display: inline-block;
        }
        .saldo-badge.al-dia { background: #dcfce7; color: #166534; }
        .deuda-progress {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            margin-top: 6px;
            overflow: hidden;
        }
        .deuda-progress-fill { height: 100%; background: #ef4444; border-radius: 10px; transition: width 0.3s; }
        .cliente-actions { display: flex; gap: 8px; align-items: center; }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(37,99,235,0.2);
        }
        button:hover { background: #1d4ed8; box-shadow: 0 4px 14px rgba(37,99,235,0.3); transform: translateY(-1px); }
        button.outline { background: white; color: #2563eb; border: 1px solid #2563eb; box-shadow: none; }
        button.outline:hover { background: #eff6ff; }
        button.danger { background: #ef4444; box-shadow: 0 2px 8px rgba(239,68,68,0.2); }
        button.danger:hover { background: #dc2626; }
        button.small { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
        button.icon-only { padding: 10px; width: 40px; height: 40px; border-radius: 10px; justify-content: center; }
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            margin-top: 6px;
            margin-bottom: 16px;
            transition: border 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: white; }
        .form-group label { font-weight: 600; font-size: 14px; color: #334155; display: flex; align-items: center; gap: 6px; }
        .producto-linea {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .producto-linea input { margin: 0; flex: 1; }
        .total-display {
            background: #f1f5f9;
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            margin: 16px 0;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.4);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 28px;
            border-radius: 24px;
            max-width: 520px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #e9eef3; }
        th { font-weight: 600; color: #64748b; font-size: 13px; text-transform: uppercase; }
        .detalle-seccion h3 {
            font-weight: 700;
            margin-bottom: 10px;
            color: #0f172a;
            font-size: 16px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }
        @media (max-width: 600px) {
            .app-container { padding: 16px; border-radius: 18px; }
            .tab { font-size: 14px; padding: 10px 12px; }
            .cliente-item { flex-direction: column; align-items: flex-start; gap: 12px; }
            .cliente-actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1><i class="fa-solid fa-store" style="color: #2563eb;"></i> Deudores Pro</h1>
        <p class="subtitulo">Gestión de créditos y abonos para tu tienda</p>

        <div class="tabs">
            <button class="tab active" data-panel="clientes"><i class="fa-solid fa-users"></i> Clientes</button>
            <button class="tab" data-panel="nueva-compra"><i class="fa-solid fa-cart-plus"></i> Nueva Compra</button>
            <button class="tab" data-panel="nuevo-abono"><i class="fa-solid fa-coins"></i> Registrar Abono</button>
        </div>

        <div id="panel-clientes" class="panel active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="font-weight: 700; font-size: 22px;">Lista de clientes</h2>
                <button id="btn-agregar-cliente" class="outline"><i class="fa-solid fa-user-plus"></i> Nuevo</button>
            </div>
            <div id="lista-clientes" class="clientes-lista"></div>
        </div>

        <div id="panel-nueva-compra" class="panel">
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-shopping-basket"></i> Registrar compra a crédito</h2>
            <div class="card">
                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Cliente</label>
                    <select id="select-cliente-compra"></select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar"></i> Fecha</label>
                    <input type="date" id="fecha-compra">
                </div>
                <h3 style="margin-top: 10px; font-weight: 600;">Productos</h3>
                <div id="productos-container"></div>
                <button id="btn-agregar-producto" class="outline small" style="margin-top: 8px;"><i class="fa-solid fa-plus"></i> Agregar producto</button>
                <div class="total-display">
                    <span>Total</span>
                    <span>$<span id="total-compra">0.00</span></span>
                </div>
                <button id="btn-guardar-compra" style="width: 100%;"><i class="fa-solid fa-save"></i> Guardar Compra</button>
            </div>
        </div>

        <div id="panel-nuevo-abono" class="panel">
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-money-bill-wave"></i> Registrar abono</h2>
            <div class="card">
                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Cliente</label>
                    <select id="select-cliente-abono"></select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar"></i> Fecha</label>
                    <input type="date" id="fecha-abono">
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-dollar-sign"></i> Monto</label>
                    <input type="number" id="monto-abono" step="0.01" min="0.01" placeholder="0.00">
                </div>
                <button id="btn-guardar-abono" style="width: 100%;"><i class="fa-solid fa-check-circle"></i> Registrar Abono</button>
            </div>
        </div>
    </div>

    <div id="modal-detalle" class="modal">
        <div class="modal-content">
            <h2 id="detalle-nombre" style="display: flex; align-items: center; gap: 8px;"></h2>
            <div id="detalle-contenido"></div>
            <button id="btn-imprimir-comprobante" class="outline" style="margin-top: 15px; width: 100%;"><i class="fa-solid fa-print"></i> Imprimir Comprobante</button>
            <button id="cerrar-modal" class="outline" style="margin-top: 10px; width: 100%;"><i class="fa-solid fa-xmark"></i> Cerrar</button>
        </div>
    </div>

    <div id="modal-cliente" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-user-plus"></i> Nuevo Cliente</h2>
            <input type="text" id="input-nombre-cliente" placeholder="Nombre completo del cliente">
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button id="cancelar-cliente" class="outline danger">Cancelar</button>
                <button id="btn-guardar-cliente"><i class="fa-solid fa-check"></i> Guardar</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // Configuración
            const STORAGE_KEY = 'debtAppData_v2';
            const nombreTienda = "Abarrotes Chávez Ávila"; // Cambia aquí el nombre de tu tienda

            let data = { clientes: [], compras: [], abonos: [] };

            function cargarDatos() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    data = JSON.parse(stored);
                } else {
                    data = {
                        clientes: [
                            { id: '1', nombre: 'María García López' },
                            { id: '2', nombre: 'Juan Pérez Hernández' }
                        ],
                        compras: [
                            { id: 'c1', clienteId: '1', fecha: '2026-04-15', items: [
                                { producto: 'Arroz 1kg', precio: 28.50 },
                                { producto: 'Aceite comestible', precio: 45.00 }
                            ], total: 73.50 },
                            { id: 'c2', clienteId: '2', fecha: '2026-04-16', items: [
                                { producto: 'Leche entera', precio: 22.00 }
                            ], total: 22.00 }
                        ],
                        abonos: [
                            { id: 'a1', clienteId: '1', fecha: '2026-04-18', monto: 30.00 }
                        ]
                    };
                    guardarDatos();
                }
            }

            function guardarDatos() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
            function generarId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
            function totalComprasCliente(id) { return data.compras.filter(c => c.clienteId === id).reduce((s, c) => s + c.total, 0); }
            function totalAbonosCliente(id) { return data.abonos.filter(a => a.clienteId === id).reduce((s, a) => s + a.monto, 0); }
            function saldoCliente(id) { return totalComprasCliente(id) - totalAbonosCliente(id); }

            function actualizarListaClientes() {
                const container = document.getElementById('lista-clientes');
                if (data.clientes.length === 0) {
                    container.innerHTML = '<div class="card" style="text-align: center; color: #64748b;">No hay clientes registrados. ¡Agrega el primero!</div>';
                    return;
                }
                container.innerHTML = data.clientes.map(cliente => {
                    const saldo = saldoCliente(cliente.id);
                    const totalDebe = totalComprasCliente(cliente.id);
                    const porcentaje = totalDebe > 0 ? (saldo / totalDebe) * 100 : 0;
                    const alDia = saldo <= 0;
                    return `
                        <div class="cliente-item">
                            <div class="cliente-info" style="flex:1; min-width:200px;">
                                <div class="cliente-nombre">
                                    <i class="fa-solid fa-user-circle" style="color: #2563eb; font-size: 24px;"></i> ${cliente.nombre}
                                </div>
                                <div>
                                    <span class="saldo-badge ${alDia ? 'al-dia' : ''}">${alDia ? 'Al día' : 'Debe: $' + saldo.toFixed(2)}</span>
                                </div>
                                ${!alDia ? `<div class="deuda-progress"><div class="deuda-progress-fill" style="width: ${Math.min(100, porcentaje)}%"></div></div>` : ''}
                            </div>
                            <div class="cliente-actions">
                                <button class="small ver-detalle" data-id="${cliente.id}"><i class="fa-solid fa-magnifying-glass"></i> Detalle</button>
                                <button class="small danger eliminar-cliente" data-id="${cliente.id}"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                }).join('');
                document.querySelectorAll('.ver-detalle').forEach(b => b.addEventListener('click', () => mostrarDetalleCliente(b.dataset.id)));
                document.querySelectorAll('.eliminar-cliente').forEach(b => b.addEventListener('click', () => eliminarCliente(b.dataset.id)));
            }

            function actualizarSelects() {
                const opts = data.clientes.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                document.getElementById('select-cliente-compra').innerHTML = opts;
                document.getElementById('select-cliente-abono').innerHTML = opts;
            }

            function renderizarProductos() {
                const cont = document.getElementById('productos-container');
                cont.innerHTML = `
                    <div class="producto-linea">
                        <input type="text" placeholder="Nombre del producto" class="input-producto" style="flex:2">
                        <input type="number" placeholder="Precio" step="0.01" class="input-precio" value="0" style="flex:1">
                        <button class="small danger btn-eliminar-producto" style="display:none;"><i class="fa-solid fa-xmark"></i></button>
                    </div>`;
                const linea = cont.querySelector('.producto-linea');
                linea.querySelector('.input-producto').addEventListener('input', calcularTotalCompra);
                linea.querySelector('.input-precio').addEventListener('input', calcularTotalCompra);
                actualizarBotonesEliminarProducto();
                calcularTotalCompra();
            }

            function agregarLineaProducto() {
                const cont = document.getElementById('productos-container');
                const div = document.createElement('div');
                div.className = 'producto-linea';
                div.innerHTML = `
                    <input type="text" placeholder="Nombre del producto" class="input-producto" style="flex:2">
                    <input type="number" placeholder="Precio" step="0.01" class="input-precio" value="0" style="flex:1">
                    <button class="small danger btn-eliminar-producto"><i class="fa-solid fa-xmark"></i></button>`;
                cont.appendChild(div);
                div.querySelector('.input-producto').addEventListener('input', calcularTotalCompra);
                div.querySelector('.input-precio').addEventListener('input', calcularTotalCompra);
                div.querySelector('.btn-eliminar-producto').addEventListener('click', () => {
                    cont.removeChild(div);
                    calcularTotalCompra();
                    actualizarBotonesEliminarProducto();
                });
                actualizarBotonesEliminarProducto();
                calcularTotalCompra();
            }

            function actualizarBotonesEliminarProducto() {
                const lineas = document.querySelectorAll('#productos-container .producto-linea');
                const mostrar = lineas.length > 1 ? 'inline-flex' : 'none';
                lineas.forEach(l => l.querySelector('.btn-eliminar-producto').style.display = mostrar);
            }

            function calcularTotalCompra() {
                let total = 0;
                document.querySelectorAll('#productos-container .input-precio').forEach(inp => total += (parseFloat(inp.value) || 0));
                document.getElementById('total-compra').textContent = total.toFixed(2);
            }

            function guardarCompra() {
                const clienteId = document.getElementById('select-cliente-compra').value;
                const fecha = document.getElementById('fecha-compra').value;
                const items = [];
                document.querySelectorAll('#productos-container .producto-linea').forEach(linea => {
                    const prod = linea.querySelector('.input-producto').value.trim();
                    const precio = parseFloat(linea.querySelector('.input-precio').value) || 0;
                    if (prod && precio > 0) items.push({ producto: prod, precio });
                });
                if (!clienteId) return alert('Selecciona un cliente');
                if (!fecha) return alert('Ingresa una fecha');
                if (items.length === 0) return alert('Agrega al menos un producto con precio');
                data.compras.push({ id: generarId(), clienteId, fecha, items, total: items.reduce((s, i) => s + i.precio, 0) });
                guardarDatos();
                actualizarListaClientes();
                document.getElementById('fecha-compra').value = new Date().toISOString().split('T')[0];
                renderizarProductos();
                alert('✅ Compra registrada');
            }

            function guardarAbono() {
                const clienteId = document.getElementById('select-cliente-abono').value;
                const fecha = document.getElementById('fecha-abono').value;
                const monto = parseFloat(document.getElementById('monto-abono').value);
                if (!clienteId || !fecha || !monto || monto <= 0) return alert('Completa los campos');
                data.abonos.push({ id: generarId(), clienteId, fecha, monto });
                guardarDatos();
                actualizarListaClientes();
                document.getElementById('fecha-abono').value = new Date().toISOString().split('T')[0];
                document.getElementById('monto-abono').value = '';
                alert('💰 Abono registrado');
            }

            function eliminarCliente(id) {
                if (!confirm('¿Eliminar cliente y todo su historial?')) return;
                data.clientes = data.clientes.filter(c => c.id !== id);
                data.compras = data.compras.filter(c => c.clienteId !== id);
                data.abonos = data.abonos.filter(a => a.clienteId !== id);
                guardarDatos();
                actualizarListaClientes();
                actualizarSelects();
            }

            function mostrarDetalleCliente(id) {
                const cliente = data.clientes.find(c => c.id === id);
                if (!cliente) return;
                const compras = data.compras.filter(c => c.clienteId === id).sort((a,b) => b.fecha.localeCompare(a.fecha));
                const abonos = data.abonos.filter(a => a.clienteId === id).sort((a,b) => b.fecha.localeCompare(a.fecha));
                const totalC = totalComprasCliente(id);
                const totalA = totalAbonosCliente(id);
                const saldo = totalC - totalA;

                document.getElementById('detalle-nombre').innerHTML = `<i class="fa-solid fa-user"></i> ${cliente.nombre}`;
                let html = `
                    <div class="detalle-seccion">
                        <h3>Resumen</h3>
                        <p><strong>Total compras:</strong> $${totalC.toFixed(2)}</p>
                        <p><strong>Total abonos:</strong> $${totalA.toFixed(2)}</p>
                        <p style="font-size:18px;"><strong>Saldo:</strong> <span style="color:${saldo>0?'#dc2626':'#16a34a'}">$${saldo.toFixed(2)}</span></p>
                    </div>
                    <div class="detalle-seccion">
                        <h3><i class="fa-solid fa-receipt"></i> Compras</h3>
                        ${compras.length ? '<table><tr><th>Fecha</th><th>Productos</th><th>Total</th><th></th></tr>' : '<p>Sin compras</p>'}
                        ${compras.map(c => `<tr>
                            <td>${c.fecha}</td>
                            <td>${c.items.map(i => i.producto + ' ($'+i.precio.toFixed(2)+')').join('<br>')}</td>
                            <td>$${c.total.toFixed(2)}</td>
                            <td><button class="small danger eliminar-compra" data-id="${c.id}"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>`).join('')}
                        ${compras.length ? '</table>' : ''}
                    </div>
                    <div class="detalle-seccion">
                        <h3><i class="fa-solid fa-coins"></i> Abonos</h3>
                        ${abonos.length ? '<table><tr><th>Fecha</th><th>Monto</th><th></th></tr>' : '<p>Sin abonos</p>'}
                        ${abonos.map(a => `<tr>
                            <td>${a.fecha}</td>
                            <td>$${a.monto.toFixed(2)}</td>
                            <td><button class="small danger eliminar-abono" data-id="${a.id}"><i class="fa-solid fa-trash"></i></button></td>
                        </tr>`).join('')}
                        ${abonos.length ? '</table>' : ''}
                    </div>`;
                document.getElementById('detalle-contenido').innerHTML = html;
                document.getElementById('modal-detalle').style.display = 'flex';

                // Configurar botón de impresión
                document.getElementById('btn-imprimir-comprobante').onclick = () => generarComprobanteImpresion(cliente);

                // Eventos de eliminación
                document.querySelectorAll('.eliminar-compra').forEach(b => b.addEventListener('click', () => {
                    if (confirm('¿Eliminar esta compra?')) {
                        data.compras = data.compras.filter(c => c.id !== b.dataset.id);
                        guardarDatos();
                        mostrarDetalleCliente(id);
                        actualizarListaClientes();
                    }
                }));
                document.querySelectorAll('.eliminar-abono').forEach(b => b.addEventListener('click', () => {
                    if (confirm('¿Eliminar este abono?')) {
                        data.abonos = data.abonos.filter(a => a.id !== b.dataset.id);
                        guardarDatos();
                        mostrarDetalleCliente(id);
                        actualizarListaClientes();
                    }
                }));
            }

            function generarComprobanteImpresion(cliente) {
                const id = cliente.id;
                const compras = data.compras.filter(c => c.clienteId === id).sort((a,b) => a.fecha.localeCompare(b.fecha));
                const abonos = data.abonos.filter(a => a.clienteId === id).sort((a,b) => a.fecha.localeCompare(b.fecha));
                const totalCompras = totalComprasCliente(id);
                const totalAbonos = totalAbonosCliente(id);
                const saldo = totalCompras - totalAbonos;
                const fechaEmision = new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' });

                const ventana = window.open('', '_blank', 'width=800,height=600');
                ventana.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <title>Comprobante - ${cliente.nombre}</title>
                        <style>
                            body { font-family: 'Courier New', monospace; margin: 30px; color: #000; }
                            h2, h3 { text-align: center; margin: 5px 0; }
                            .datos { margin-bottom: 15px; }
                            table { width: 100%; border-collapse: collapse; margin-bottom: 15px; }
                            th, td { border: 1px solid #000; padding: 6px; text-align: left; }
                            .total { font-weight: bold; }
                            .footer { margin-top: 30px; text-align: center; font-size: 12px; }
                            @media print {
                                body { margin: 0; }
                                button { display: none; }
                            }
                        </style>
                    </head>
                    <body>
                        <h2>${nombreTienda}</h2>
                        <h3>Comprobante de Cuenta Corriente</h3>
                        <div class="datos">
                            <p><strong>Cliente:</strong> ${cliente.nombre}</p>
                            <p><strong>Fecha de emisión:</strong> ${fechaEmision}</p>
                        </div>
                        <h4>Compras a crédito</h4>
                        <table>
                            <tr><th>Fecha</th><th>Producto</th><th>Precio</th></tr>
                            ${compras.flatMap(c => c.items.map(item => `<tr><td>${c.fecha}</td><td>${item.producto}</td><td>$${item.precio.toFixed(2)}</td></tr>`)).join('')}
                            <tr class="total"><td colspan="2">Total compras</td><td>$${totalCompras.toFixed(2)}</td></tr>
                        </table>
                        <h4>Abonos realizados</h4>
                        <table>
                            ${abonos.length ? '<tr><th>Fecha</th><th>Monto</th></tr>' : ''}
                            ${abonos.map(a => `<tr><td>${a.fecha}</td><td>$${a.monto.toFixed(2)}</td></tr>`).join('')}
                            ${abonos.length ? `<tr class="total"><td>Total abonos</td><td>$${totalAbonos.toFixed(2)}</td></tr>` : '<p>No se han registrado abonos.</p>'}
                        </table>
                        <h3>Saldo pendiente: $${saldo.toFixed(2)}</h3>
                        ${saldo === 0 ? '<p style="text-align:center; font-size:18px;">✅ DEUDA LIQUIDADA</p>' : ''}
                        <div class="footer">
                            <p>Gracias por su preferencia<br>Este comprobante es un resumen de movimientos.</p>
                        </div>
                        <button onclick="window.print(); setTimeout(window.close, 500);" style="display:block; margin:20px auto; padding:10px 20px;">Imprimir</button>
                    </body>
                    </html>
                `);
                ventana.document.close();
                // Pequeño retraso para asegurar render antes de imprimir
                ventana.focus();
                setTimeout(() => ventana.print(), 300);
            }

            function iniciar() {
                cargarDatos();
                actualizarListaClientes();
                actualizarSelects();
                const hoy = new Date().toISOString().split('T')[0];
                document.getElementById('fecha-compra').value = hoy;
                document.getElementById('fecha-abono').value = hoy;
                renderizarProductos();

                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
                    });
                });

                document.getElementById('btn-agregar-cliente').addEventListener('click', () => document.getElementById('modal-cliente').style.display = 'flex');
                document.getElementById('cancelar-cliente').addEventListener('click', () => {
                    document.getElementById('modal-cliente').style.display = 'none';
                    document.getElementById('input-nombre-cliente').value = '';
                });
                document.getElementById('btn-guardar-cliente').addEventListener('click', () => {
                    const nombre = document.getElementById('input-nombre-cliente').value.trim();
                    if (!nombre) return alert('Ingresa un nombre');
                    data.clientes.push({ id: generarId(), nombre });
                    guardarDatos();
                    actualizarListaClientes();
                    actualizarSelects();
                    document.getElementById('modal-cliente').style.display = 'none';
                    document.getElementById('input-nombre-cliente').value = '';
                });

                document.getElementById('cerrar-modal').addEventListener('click', () => document.getElementById('modal-detalle').style.display = 'none');
                window.addEventListener('click', (e) => {
                    if (e.target === document.getElementById('modal-detalle')) document.getElementById('modal-detalle').style.display = 'none';
                    if (e.target === document.getElementById('modal-cliente')) document.getElementById('modal-cliente').style.display = 'none';
                });

                document.getElementById('btn-agregar-producto').addEventListener('click', agregarLineaProducto);
                document.getElementById('btn-guardar-compra').addEventListener('click', guardarCompra);
                document.getElementById('btn-guardar-abono').addEventListener('click', guardarAbono);
            }

            iniciar();
        })();
    </script>
</body>
</html>
